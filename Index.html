<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System Explorer</title>

  <style>
    /* =========================================================
       SOLAR SYSTEM EXPLORER
       HTML5 + CSS3 + Vanilla JavaScript
       Archivo único: index.html
       ========================================================= */

    /* =========================
       VARIABLES DE DISEÑO
       ========================= */
    :root {
      --dark-blue: #0B1F3A;
      --space-black: #111827;
      --sky-blue: #3B82F6;
      --space-purple: #7C3AED;
      --white: #FFFFFF;
      --light-gray: #F3F4F6;

      --bg-main: #111827;
      --bg-secondary: rgba(11, 31, 58, 0.72);
      --text-main: #FFFFFF;
      --text-muted: #CBD5E1;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.16);
      --input-bg: rgba(255, 255, 255, 0.1);
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.35);
      --shadow-glow: 0 0 22px rgba(59, 130, 246, 0.55);
      --radius-lg: 26px;
      --radius-md: 18px;
      --header-height: 78px;
      --transition-fast: 0.25s ease;
      --transition-normal: 0.45s ease;
    }

    body.light-mode {
      --bg-main: #F3F4F6;
      --bg-secondary: rgba(255, 255, 255, 0.78);
      --text-main: #111827;
      --text-muted: #334155;
      --card-bg: rgba(255, 255, 255, 0.82);
      --card-border: rgba(15, 23, 42, 0.12);
      --input-bg: rgba(255, 255, 255, 0.95);
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.13);
      --shadow-glow: 0 0 18px rgba(59, 130, 246, 0.35);
    }

    /* =========================
       RESET Y BASE
       ========================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.25), transparent 32%),
        radial-gradient(circle at 80% 10%, rgba(59, 130, 246, 0.22), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(124, 58, 237, 0.18), transparent 32%),
        var(--bg-main);
      transition: background var(--transition-normal), color var(--transition-normal);
    }

    body.no-scroll {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    button {
      cursor: pointer;
      border: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* =========================
       FONDO ESPACIAL
       ========================= */
    .space-background {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
      pointer-events: none;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: absolute;
      inset: 0;
      content: "";
      background-repeat: repeat;
      animation: moveStars 90s linear infinite;
    }

    .stars {
      background-image:
        radial-gradient(#ffffff 1px, transparent 1px),
        radial-gradient(rgba(255, 255, 255, 0.8) 1px, transparent 1px);
      background-size: 90px 90px, 150px 150px;
      background-position: 0 0, 40px 70px;
      opacity: 0.9;
    }

    .stars::before {
      background-image: radial-gradient(rgba(59, 130, 246, 0.8) 1px, transparent 1px);
      background-size: 120px 120px;
      animation-duration: 130s;
      opacity: 0.55;
    }

    .stars::after {
      background-image: radial-gradient(rgba(124, 58, 237, 0.9) 1px, transparent 1px);
      background-size: 180px 180px;
      animation-duration: 170s;
      opacity: 0.45;
    }

    .nebula {
      position: absolute;
      width: 580px;
      height: 580px;
      border-radius: 50%;
      filter: blur(65px);
      opacity: 0.42;
      animation: floatNebula 14s ease-in-out infinite alternate;
    }

    .nebula.one {
      left: -160px;
      top: 160px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.65), transparent 65%);
    }

    .nebula.two {
      right: -180px;
      bottom: -100px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.55), transparent 65%);
      animation-delay: 2s;
    }

    @keyframes moveStars {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-420px);
      }
    }

    @keyframes floatNebula {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }

      to {
        transform: translate3d(40px, -35px, 0) scale(1.08);
      }
    }

    /* =========================
       UTILIDADES
       ========================= */
    .glass {
      background: var(--bg-secondary);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 20px;
      border-radius: 999px;
      color: var(--white);
      font-weight: 700;
      background: linear-gradient(135deg, var(--sky-blue), var(--space-purple));
      box-shadow: var(--shadow-glow);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), filter var(--transition-fast);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 32px rgba(124, 58, 237, 0.65);
      filter: brightness(1.08);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--card-border);
      box-shadow: none;
      color: var(--text-main);
    }

    .btn.danger {
      background: linear-gradient(135deg, #EF4444, #B91C1C);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--card-border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition-fast), background var(--transition-fast);
    }

    .icon-btn:hover {
      transform: translateY(-2px);
      background: rgba(59, 130, 246, 0.22);
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 3.2rem);
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .section-subtitle {
      color: var(--text-muted);
      font-size: 1.05rem;
      max-width: 820px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      gap: 22px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .card {
      padding: 24px;
      border-radius: var(--radius-lg);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-soft);
      transition: transform var(--transition-fast), border var(--transition-fast), box-shadow var(--transition-fast);
    }

    .card:hover {
      transform: translateY(-7px);
      border-color: rgba(59, 130, 246, 0.55);
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.36), var(--shadow-glow);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--white);
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.75), rgba(124, 58, 237, 0.75));
    }

    .muted {
      color: var(--text-muted);
    }

    .hidden {
      display: none !important;
    }

    /* =========================
       HEADER
       ========================= */
    .top-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      width: 0;
      z-index: 3000;
      background: linear-gradient(90deg, var(--sky-blue), var(--space-purple));
      box-shadow: var(--shadow-glow);
      transition: width 0.2s ease;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 5%;
      background: rgba(17, 24, 39, 0.72);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    body.light-mode .header {
      background: rgba(255, 255, 255, 0.74);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: max-content;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #FFFFFF 0 5px, transparent 6px),
        radial-gradient(circle, #3B82F6 0 34%, #7C3AED 35% 70%, #0B1F3A 71%);
      box-shadow: var(--shadow-glow);
      position: relative;
    }

    .logo::after {
      content: "";
      position: absolute;
      inset: 7px -8px;
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 50%;
      transform: rotate(-22deg);
    }

    .brand-text strong {
      display: block;
      font-size: 1rem;
      letter-spacing: 0.3px;
    }

    .brand-text span {
      display: block;
      font-size: 0.76rem;
      color: var(--text-muted);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .nav button {
      padding: 9px 11px;
      border-radius: 999px;
      color: var(--text-main);
      background: transparent;
      font-weight: 700;
      font-size: 0.88rem;
      transition: background var(--transition-fast), color var(--transition-fast);
    }

    .nav button:hover,
    .nav button.active {
      color: var(--white);
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.75), rgba(124, 58, 237, 0.75));
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .clock {
      min-width: 82px;
      text-align: center;
      font-size: 0.86rem;
      font-weight: 800;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--card-border);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--card-border);
      align-items: center;
      justify-content: center;
    }

    .hamburger span {
      width: 19px;
      height: 2px;
      background: var(--text-main);
      border-radius: 99px;
    }

    .search-panel {
      position: fixed;
      top: calc(var(--header-height) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(-16px);
      width: min(720px, 92vw);
      z-index: 1900;
      opacity: 0;
      pointer-events: none;
      padding: 14px;
      border-radius: 22px;
      transition: opacity var(--transition-fast), transform var(--transition-fast);
    }

    .search-panel.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .search-box {
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      padding: 14px 16px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      outline: none;
      background: var(--input-bg);
      color: var(--text-main);
    }

    /* =========================
       LAYOUT SPA
       ========================= */
    .app {
      min-height: 100vh;
      padding: calc(var(--header-height) + 34px) 5% 28px;
      display: flex;
      flex-direction: column;
    }

    .main-shell {
      width: 100%;
      max-width: 1380px;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .dynamic-content {
      position: relative;
      min-height: calc(100vh - var(--header-height) - 128px);
      border-radius: 34px;
      overflow: hidden;
    }

    .view {
      display: none;
      height: 100%;
      min-height: calc(100vh - var(--header-height) - 128px);
      padding: clamp(24px, 4vw, 46px);
      border-radius: 34px;
      animation: fadeSlide 0.45s ease both;
      overflow: auto;
      max-height: calc(100vh - var(--header-height) - 128px);
    }

    .view.active {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* =========================
       HERO Y SISTEMA SOLAR ANIMADO
       ========================= */
    .hero-layout {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      align-items: center;
      gap: 34px;
      min-height: calc(100vh - var(--header-height) - 220px);
    }

    .hero-title {
      font-size: clamp(2.6rem, 6vw, 5.8rem);
      line-height: 0.96;
      margin-bottom: 22px;
      letter-spacing: -2px;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--sky-blue), #FFFFFF, var(--space-purple));
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero-description {
      font-size: 1.18rem;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 690px;
      margin-bottom: 30px;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 30px;
      max-width: 680px;
    }

    .stat-box {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--card-border);
    }

    .stat-box strong {
      display: block;
      font-size: 1.45rem;
      color: var(--sky-blue);
      margin-bottom: 4px;
    }

    .solar-animation {
      position: relative;
      width: min(500px, 82vw);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.12), transparent 65%);
    }

    .sun {
      position: absolute;
      width: 82px;
      height: 82px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FFF8B5, #F59E0B 52%, #EF4444);
      box-shadow: 0 0 48px #F59E0B;
      z-index: 5;
    }

    .orbit {
      position: absolute;
      inset: var(--orbit-inset);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      animation: rotateOrbit var(--orbit-speed) linear infinite;
    }

    .orbit::before {
      content: "";
      position: absolute;
      width: var(--planet-size);
      height: var(--planet-size);
      border-radius: 50%;
      background: var(--planet-color);
      left: 50%;
      top: calc(var(--planet-size) / -2);
      transform: translateX(-50%);
      box-shadow: 0 0 14px var(--planet-color);
    }

    @keyframes rotateOrbit {
      to {
        transform: rotate(360deg);
      }
    }

    /* =========================
       PLANETAS
       ========================= */
    .planet-card {
      cursor: pointer;
    }

    .planet-visual {
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .planet-sphere {
      width: 118px;
      height: 118px;
      border-radius: 50%;
      background: var(--planet-gradient);
      box-shadow: 0 0 30px var(--planet-glow);
      position: relative;
      overflow: hidden;
    }

    .planet-sphere::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.35), transparent 48%, rgba(255, 255, 255, 0.14));
      border-radius: 50%;
    }

    .planet-card h3 {
      font-size: 1.35rem;
      margin-bottom: 8px;
    }

    .planet-data {
      display: grid;
      gap: 8px;
      margin: 14px 0;
      font-size: 0.92rem;
    }

    .planet-data span {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 7px;
      color: var(--text-muted);
    }

    .planet-data strong {
      color: var(--text-main);
    }

    /* =========================
       TABLAS
       ========================= */
    .table-wrapper {
      overflow: auto;
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: rgba(255, 255, 255, 0.05);
    }

    th,
    td {
      padding: 15px 16px;
      text-align: left;
      border-bottom: 1px solid var(--card-border);
    }

    th {
      position: sticky;
      top: 0;
      color: var(--white);
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.85), rgba(124, 58, 237, 0.85));
    }

    td {
      color: var(--text-muted);
    }

    td:first-child {
      color: var(--text-main);
      font-weight: 800;
    }

    /* =========================
       TIMELINE
       ========================= */
    .timeline {
      position: relative;
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 10px;
      bottom: 10px;
      width: 3px;
      background: linear-gradient(var(--sky-blue), var(--space-purple));
      border-radius: 999px;
    }

    .timeline-item {
      position: relative;
      padding-left: 60px;
    }

    .timeline-dot {
      position: absolute;
      left: 10px;
      top: 18px;
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sky-blue), var(--space-purple));
      box-shadow: var(--shadow-glow);
    }

    /* =========================
       GALERÍA
       ========================= */
    .gallery-card {
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      background: var(--gallery-bg);
    }

    .gallery-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.35), transparent 18%),
        linear-gradient(to top, rgba(0, 0, 0, 0.78), transparent 65%);
      opacity: 0.9;
    }

    .gallery-card > * {
      position: relative;
      z-index: 2;
    }

    /* =========================
       FORMULARIOS
       ========================= */
    .form {
      display: grid;
      gap: 16px;
      max-width: 780px;
    }

    .form.full {
      max-width: 960px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      font-weight: 800;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 14px 15px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      outline: none;
      color: var(--text-main);
      background: var(--input-bg);
      transition: border var(--transition-fast), box-shadow var(--transition-fast);
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--sky-blue);
      box-shadow: var(--shadow-glow);
    }

    .error {
      min-height: 18px;
      color: #FCA5A5;
      font-size: 0.84rem;
    }

    .success-message {
      margin-top: 14px;
      color: #86EFAC;
      font-weight: 800;
    }

    .password-wrapper {
      display: flex;
      gap: 8px;
    }

    .password-wrapper input {
      flex: 1;
    }

    /* =========================
       QUIZ
       ========================= */
    .quiz-progress {
      height: 13px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      margin: 20px 0;
    }

    .quiz-progress span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--sky-blue), var(--space-purple));
      transition: width var(--transition-normal);
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .answer-btn {
      padding: 15px;
      text-align: left;
      border-radius: 16px;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--card-border);
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .answer-btn:hover {
      transform: translateX(5px);
      background: rgba(59, 130, 246, 0.18);
    }

    /* =========================
       FAQ
       ========================= */
    .accordion {
      display: grid;
      gap: 12px;
    }

    .accordion-item {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.06);
    }

    .accordion-button {
      width: 100%;
      text-align: left;
      padding: 17px 18px;
      background: transparent;
      color: var(--text-main);
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;

    }

    /* =========================
       MODALES
       ========================= */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 4000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
    }

    .modal.show {
      display: flex;
      animation: fadeIn 0.25s ease both;
    }

    .modal-content {
      width: min(920px, 96vw);
      max-height: 88vh;
      overflow: auto;
      border-radius: 30px;
      padding: 28px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 2;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

       FOOTER Y BOTÓN INICIO
       ========================= */
    .footer {

      width: 100%;
      margin: 18px auto 0;
      padding: 18px 22px;
      border-radius: 24px;

      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 1800;
    }

       ========================= */

      }

        display: flex;
      }

      }
    }

</head>

    function bindRegisterEvents() {
      const form = document.getElementById("registerForm");
      if (!form) return;

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        clearErrors(form);

        const name = document.getElementById("regName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        const confirm = document.getElementById("regConfirm").value;

        let valid = true;

        if (!name) {
          showMessage("regNameError", "El nombre completo es obligatorio.");
          valid = false;
        }

        if (!email) {
          showMessage("regEmailError", "El correo electrónico es obligatorio.");
          valid = false;
        } else if (!validateEmail(email)) {
          showMessage("regEmailError", "Ingresa un correo electrónico válido.");
          valid = false;
        }

        if (!password) {
          showMessage("regPasswordError", "La contraseña es obligatoria.");
          valid = false;
        } else if (password.length < 8) {
          showMessage("regPasswordError", "La contraseña debe tener mínimo ocho caracteres.");
          valid = false;
        }

        if (!confirm) {
          showMessage("regConfirmError", "Confirma tu contraseña.");
          valid = false;
        } else if (password !== confirm) {
          showMessage("regConfirmError", "Las contraseñas no coinciden.");
          valid = false;
        }

        const users = getUsers();
        const exists = users.some((user) => user.email.toLowerCase() === email.toLowerCase());

        if (exists) {
          showMessage("regEmailError", "Este correo ya está registrado.");
          valid = false;
        }

        if (!valid) return;

        users.push({
          name,
          email,
          password,
          createdAt: new Date().toISOString()
        });

        saveUsers(users);
        form.reset();
        showMessage("registerMessage", "¡Registro exitoso! Tu cuenta ha sido creada correctamente.", true);
      });
    }

    function bindLoginEvents() {
      const form = document.getElementById("loginForm");
      const togglePassword = document.getElementById("togglePassword");
      const logoutButton = document.getElementById("logoutButton");

      if (togglePassword) {
        togglePassword.addEventListener("click", () => {
          const input = document.getElementById("loginPassword");
          const isPassword = input.type === "password";
          input.type = isPassword ? "text" : "password";
          togglePassword.textContent = isPassword ? "Ocultar" : "Mostrar";
        });
      }

      if (logoutButton) {
        logoutButton.addEventListener("click", () => {
          const confirmed = confirm("¿Deseas cerrar sesión?");
          if (!confirmed) return;

          clearActiveSession();
          dynamicContent.innerHTML = `
            <section class="view active">
              ${renderLogin()}
              <p class="success-message">Has cerrado sesión correctamente.</p>
            </section>
          `;
          bindLoginEvents();
        });
      }

      if (!form) return;

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        clearErrors(form);

        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        let valid = true;

        if (!email) {
          showMessage("loginEmailError", "El correo electrónico es obligatorio.");
          valid = false;
        } else if (!validateEmail(email)) {
          showMessage("loginEmailError", "Ingresa un correo válido.");
          valid = false;
        }

        if (!password) {
          showMessage("loginPasswordError", "La contraseña es obligatoria.");
          valid = false;
        }

        if (!valid) return;

        const users = getUsers();
        const user = users.find((item) =>
          item.email.toLowerCase() === email.toLowerCase() &&
          item.password === password
        );

        if (!user) {
          showMessage("loginMessage", "Correo o contraseña incorrectos.");
          return;
        }

        setActiveSession({
          name: user.name,
          email: user.email
        });

        dynamicContent.innerHTML = `
          <section class="view active">
            ${renderLogin()}
            <p class="success-message">¡Bienvenido a Solar System Explorer!</p>
          </section>
        `;
        bindLoginEvents();
      });
    }

    function bindContactEvents() {
      const form = document.getElementById("infoForm");
      if (!form) return;

      form.addEventListener("reset", () => {
        setTimeout(() => clearErrors(form), 0);
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        clearErrors(form);

        const data = {
          name: document.getElementById("infoName").value.trim(),
          email: document.getElementById("infoEmail").value.trim(),
          age: document.getElementById("infoAge").value.trim(),
          country: document.getElementById("infoCountry").value.trim(),
          planet: document.getElementById("infoPlanet").value,
          level: document.getElementById("infoLevel").value,
          topics: document.getElementById("infoTopics").value.trim(),
          comments: document.getElementById("infoComments").value.trim(),
          createdAt: new Date().toISOString()
        };

        let valid = true;

        if (!data.name) {
          showMessage("infoNameError", "El nombre es obligatorio.");
          valid = false;
        }

        if (!data.email) {
          showMessage("infoEmailError", "El correo es obligatorio.");
          valid = false;
        } else if (!validateEmail(data.email)) {
          showMessage("infoEmailError", "Ingresa un correo válido.");
          valid = false;
        }

        if (!data.age) {
          showMessage("infoAgeError", "La edad es obligatoria.");
          valid = false;
        } else if (Number(data.age) < 5 || Number(data.age) > 100) {
          showMessage("infoAgeError", "La edad debe estar entre 5 y 100 años.");
          valid = false;
        }

        if (!data.country) {
          showMessage("infoCountryError", "El país es obligatorio.");
          valid = false;
        }

        if (!data.planet) {
          showMessage("infoPlanetError", "Selecciona un planeta favorito.");
          valid = false;
        }

        if (!data.level) {
          showMessage("infoLevelError", "Selecciona tu nivel educativo.");
          valid = false;
        }

        if (!data.topics) {
          showMessage("infoTopicsError", "Indica al menos un tema de interés.");
          valid = false;
        }

        if (!data.comments || data.comments.length < 10) {
          showMessage("infoCommentsError", "Escribe un comentario de mínimo diez caracteres.");
          valid = false;
        }

        if (!valid) return;

        const records = getEducationRecords();
        records.push(data);
        localStorage.setItem("sseEducationRecords", JSON.stringify(records));

        document.getElementById("recordCounter").textContent = records.length;
        form.reset();
        showMessage("infoMessage", "Información enviada y guardada correctamente.", true);
      });
    }

    function bindAccordionEvents() {
      document.querySelectorAll(".accordion-button").forEach((button) => {
        button.addEventListener("click", () => {
          const item = button.closest(".accordion-item");
          item.classList.toggle("open");
          button.querySelector("span").textContent = item.classList.contains("open") ? "-" : "+";
        });
      });
    }

    /* =========================
       MODALES
       ========================= */
    function openPlanetModal(planet) {
      modalBody.innerHTML = `
        <div class="grid grid-2" style="align-items: center;">
          <div class="planet-visual" style="height: 260px;">
            <div
              class="planet-sphere"
              style="width: 210px; height: 210px; --planet-gradient: ${planet.color}; --planet-glow: ${planet.glow};"
            ></div>
          </div>

          <div>
            <span class="pill">${planet.type}</span>
            <h2 class="section-title" style="margin-top: 12px;">${planet.name}</h2>
            <p class="muted">${planet.details}</p>
          </div>
        </div>

        <div class="grid grid-3" style="margin-top: 24px;">
          <div class="card">
            <h3>Características</h3>
            <p class="muted">Distancia al Sol: ${planet.distance}</p>
            <p class="muted">Diámetro: ${planet.diameter}</p>
            <p class="muted">Lunas: ${planet.moons}</p>
          </div>

          <div class="card">
            <h3>Datos científicos</h3>
            <p class="muted">Masa: ${planet.mass}</p>
            <p class="muted">Gravedad: ${planet.gravity}</p>
            <p class="muted">Temperatura: ${planet.temperature}</p>
          </div>

          <div class="card">
            <h3>Tiempo orbital</h3>
            <p class="muted">Día: ${planet.day}</p>
            <p class="muted">Año: ${planet.year}</p>
          </div>
        </div>

        <div class="card" style="margin-top: 20px;">
          <h3>Curiosidades</h3>
          <ul style="margin-left: 20px; color: var(--text-muted); line-height: 1.8;">
            ${planet.facts.map((fact) => `<li>${fact}</li>`).join("")}
          </ul>
        </div>
      `;

      modal.classList.add("show");
      document.body.classList.add("no-scroll");
    }

    function openGalleryModal(item) {
      modalBody.innerHTML = `
        <div
          style="
            min-height: 360px;
            border-radius: 26px;
            background: ${item[2]};
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-soft);
            margin-bottom: 22px;
          "
        ></div>

        <span class="pill">${svgIcon("telescope")} Galería</span>
        <h2 class="section-title">${item[0]}</h2>
        <p class="section-subtitle">${item[1]}</p>
      `;

      modal.classList.add("show");
      document.body.classList.add("no-scroll");
    }

    function closeModal() {
      modal.classList.remove("show");
      document.body.classList.remove("no-scroll");
    }

    /* =========================
       QUIZ
       ========================= */
    function handleAnswer(selectedIndex) {
      const question = quizQuestions[quizIndex];

      if (selectedIndex === question.correct) {
        quizScore++;
        quizCorrectAnswers.push(question.question);
      }

      quizIndex++;

      if (quizIndex >= quizQuestions.length) {
        renderQuizResult();
      } else {
        renderQuizQuestion();
      }
    }

    /* =========================
       BUSCADOR
       ========================= */
    function performSearch() {
      const query = searchInput.value.trim();
      const key = normalizeText(query);

      if (!query) return;

      const item = searchData[key];

      searchPanel.classList.remove("show");
      navButtons.forEach((button) => button.classList.remove("active"));

      if (item) {
        renderSearchResult(item);
      } else {
        renderNotFound(query);
      }

      dynamicContent.scrollTop = 0;
      updateProgress();
    }

    /* =========================
       LOCALSTORAGE Y CONTADORES
       ========================= */
    function incrementVisitors() {
      const current = Number(localStorage.getItem("sseVisitors") || "0");
      localStorage.setItem("sseVisitors", String(current + 1));
    }

    function getEducationRecords() {
      return JSON.parse(localStorage.getItem("sseEducationRecords")) || [];
    }

    function updateCounters() {
      const visitor = document.getElementById("visitorCount");
      const education = document.getElementById("educationCount");

      if (visitor) visitor.textContent = localStorage.getItem("sseVisitors") || "0";
      if (education) education.textContent = getEducationRecords().length;
    }

    function getRandomCuriosity() {
      return curiosities[Math.floor(Math.random() * curiosities.length)];
    }

    /* =========================
       RELOJ, PROGRESO Y TEMA
       ========================= */
    function updateClock() {
      const clock = document.getElementById("clock");
      const now = new Date();
      clock.textContent = now.toLocaleTimeString("es-CO", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function updateProgress() {
      const progress = document.getElementById("topProgress");
      const scrollTop = dynamicContent.scrollTop;
      const maxScroll = dynamicContent.scrollHeight - dynamicContent.clientHeight;
      const percent = maxScroll > 0 ? (scrollTop / maxScroll) * 100 : 100;
      progress.style.width = percent + "%";
    }

    function loadTheme() {
      const theme = localStorage.getItem("sseTheme");
      const button = document.getElementById("themeToggle");

      if (theme === "light") {
        document.body.classList.add("light-mode");
        button.textContent = "☀";
      } else {
        button.textContent = "🌙";
      }
    }

    function toggleTheme() {
      const button = document.getElementById("themeToggle");
      document.body.classList.toggle("light-mode");

      const isLight = document.body.classList.contains("light-mode");
      localStorage.setItem("sseTheme", isLight ? "light" : "dark");
      button.textContent = isLight ? "☀" : "🌙";
    }

    /* =========================
       MÚSICA AMBIENTAL SIN ARCHIVOS EXTERNOS
       Web Audio API: no hay reproducción automática.
       ========================= */
    function startAmbientMusic() {
      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();

      const masterGain = audioContext.createGain();
      masterGain.gain.value = 0.045;
      masterGain.connect(audioContext.destination);

      const frequencies = [196, 246.94, 329.63];

      musicNodes = frequencies.map((frequency, index) => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = frequency;
        gain.gain.value = 0.16 / (index + 1);

        oscillator.connect(gain);
        gain.connect(masterGain);
        oscillator.start();

        return { oscillator, gain, masterGain };
      });

      musicPlaying = true;
      document.getElementById("musicToggle").textContent = "❚❚";
    }

    function stopAmbientMusic() {
      musicNodes.forEach((node) => {
        try {
          node.oscillator.stop();
          node.oscillator.disconnect();
          node.gain.disconnect();
          node.masterGain.disconnect();
        } catch (error) {
          console.warn("Nodo de audio ya detenido.");
        }
      });

      musicNodes = [];
      musicPlaying = false;
      document.getElementById("musicToggle").textContent = "♫";
    }

    function toggleMusic() {
      if (musicPlaying) {
        stopAmbientMusic();
      } else {
        startAmbientMusic();
      }
    }

    /* =========================
       EVENTOS GLOBALES
       ========================= */
    navButtons.forEach((button) => {
      button.addEventListener("click", () => navigateTo(button.dataset.view));
    });

    document.querySelector("[data-view-link='home']").addEventListener("click", (event) => {
      event.preventDefault();
      navigateTo("home");
    });

    document.getElementById("hamburger").addEventListener("click", () => {
      nav.classList.toggle("show");
    });

    document.getElementById("searchToggle").addEventListener("click", () => {
      searchPanel.classList.toggle("show");
      if (searchPanel.classList.contains("show")) {
        searchInput.focus();
      }
    });

    document.getElementById("searchButton").addEventListener("click", performSearch);

    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        performSearch();
      }
    });

    document.getElementById("themeToggle").addEventListener("click", toggleTheme);
    document.getElementById("musicToggle").addEventListener("click", toggleMusic);
    document.getElementById("backHome").addEventListener("click", () => navigateTo("home"));
    document.getElementById("modalClose").addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeModal();
        searchPanel.classList.remove("show");
        nav.classList.remove("show");
      }
    });

    dynamicContent.addEventListener("scroll", updateProgress);

    /* =========================
       INICIALIZACIÓN
       ========================= */
    function init() {
      document.getElementById("year").textContent = new Date().getFullYear();
      loadTheme();
      updateClock();
      setInterval(updateClock, 1000);
      navigateTo("home");
    }

    init();
  </script>
</body>
</html>
